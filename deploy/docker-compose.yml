# VPS production stack — pull pre-built images from GHCR (no local build).
# Usage: copy this deploy/ folder to your server, configure .env, then:
#   ./init-letsencrypt.sh   # first time only
#   docker compose up -d

name: job-scheduler

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app

  api:
    image: ${GHCR_IMAGE_PREFIX}/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      SCHEDULER_ALGORITHM: ${SCHEDULER_ALGORITHM:-heap}
      DLQ_ALERT_THRESHOLD: ${DLQ_ALERT_THRESHOLD:-5}
      DLQ_ALERT_EMAIL: ${DLQ_ALERT_EMAIL:-ops@dilamme.com}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app

  worker:
    image: ${GHCR_IMAGE_PREFIX}/worker:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      SCHEDULER_ALGORITHM: ${SCHEDULER_ALGORITHM:-heap}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app

  frontend:
    image: ${GHCR_IMAGE_PREFIX}/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - app

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend
    networks:
      - app

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $$!; done"
    networks:
      - app

volumes:
  redis_data:
  certbot-www:
  certbot-certs:

networks:
  app:
    driver: bridge
